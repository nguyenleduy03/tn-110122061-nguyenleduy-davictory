# CẤU HÌNH TỐI ƯU CHO APPLICATION.YAML

# Thêm vào file: backend/src/main/resources/application.yaml

spring:
  application:
    name: DAVictory
    
  # ✅ DATABASE OPTIMIZATION
  datasource:
    url: jdbc:mysql://localhost:3306/DAVictory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
    username: root
    password: 1111
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # ✅ HIKARI CONNECTION POOL - Tối ưu cho production
    hikari:
      maximum-pool-size: 20              # Tăng từ 10 (default) lên 20
      minimum-idle: 5                     # Giữ sẵn 5 connections
      connection-timeout: 30000           # 30s timeout
      idle-timeout: 600000                # 10 phút idle
      max-lifetime: 1800000               # 30 phút max lifetime
      leak-detection-threshold: 60000     # Cảnh báo connection leak sau 60s
      
  # ✅ JPA OPTIMIZATION
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false                       # Tắt trong production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        
        # ✅ BATCH PROCESSING
        jdbc:
          batch_size: 20                  # Batch insert/update
          fetch_size: 50                  # Fetch nhiều rows cùng lúc
        order_inserts: true
        order_updates: true
        
        # ✅ QUERY OPTIMIZATION
        default_batch_fetch_size: 10      # Giảm N+1 queries
        
        # ✅ SECOND LEVEL CACHE (nếu cần)
        cache:
          use_second_level_cache: false   # Bật sau khi thêm cache provider
          use_query_cache: false
          
    # ✅ TẮT OPEN-IN-VIEW (Quan trọng!)
    open-in-view: false                   # Tránh lazy loading trong view
    
  # ✅ FILE UPLOAD - Giảm từ 2GB xuống mức hợp lý
  servlet:
    multipart:
      max-file-size: 50MB                 # Giảm từ 2GB
      max-request-size: 50MB              # Giảm từ 2GB
      file-size-threshold: 2MB            # Buffer size

# ✅ SERVER OPTIMIZATION
server:
  port: 8080
  
  tomcat:
    max-http-form-post-size: 50MB         # Giảm từ 2GB
    max-swallow-size: 50MB                # Giảm từ 2GB
    
    # ✅ THREAD POOL
    threads:
      max: 200                            # Max threads
      min-spare: 10                       # Min threads
    
    # ✅ CONNECTION TIMEOUT
    connection-timeout: 20000             # 20s
    
    # ✅ COMPRESSION
    compression:
      enabled: true
      mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json
      min-response-size: 1024             # Compress nếu > 1KB

# ✅ LOGGING
logging:
  level:
    root: INFO
    com.victory.DAVictory: INFO
    org.hibernate.SQL: DEBUG              # Bật để debug queries
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # Xem parameters
    com.zaxxer.hikari: DEBUG              # Debug connection pool
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/davictory.log
    max-size: 10MB
    max-history: 7

