spring:
  application:
    name: DAVictory
  datasource:
    url: jdbc:mysql://localhost:3306/DAVictory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull
    username: root
    password: ${DB_PASSWORD:1111}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      cache-prep-stmts: true
      prep-stmt-cache-size: 250
      prep-stmt-cache-sql-limit: 2048
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

server:
  tomcat:
    max-http-form-post-size: 2GB
    max-swallow-size: 2GB
  forward-headers-strategy: native

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

jwt:
  secret: ${JWT_SECRET:DAVictorySecretKey2026ChangeInProduction}
  expiration: 86400000
  refresh-expiration: 604800000

google:
  drive:
    client-id: ${GOOGLE_DRIVE_CLIENT_ID:your-client-id}
    client-secret: ${GOOGLE_DRIVE_CLIENT_SECRET:your-client-secret}
    redirect-uri: ${GOOGLE_DRIVE_REDIRECT_URI:https://davictory.io.vn/api/drive/oauth2callback}
    frontend-url: ${GOOGLE_DRIVE_FRONTEND_URL:https://davictory.io.vn}
    folder:
      id: ${GOOGLE_DRIVE_FOLDER_ID:your-folder-id}

app:
  ai:
    service:
      url: ${AI_SERVICE_URL:http://localhost:5182}
    import:
      service:
        url: ${AI_IMPORT_SERVICE_URL:http://localhost:5186}
    agent:
      service:
        url: ${AI_AGENT_SERVICE_URL:http://localhost:5187}
  agent:
    uploads:
      dir: ${AI_AGENT_UPLOADS_DIR:../ai-agent-python/uploads}

logging:
  