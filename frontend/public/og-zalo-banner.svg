<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DAVictory – Luyện thi IELTS hiện đại</title>
  <desc id="desc">Banner chia sẻ trang web dành cho Zalo với thiết kế hiện đại, nền gradient xanh tím và thông điệp luyện thi IELTS.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="42" x2="1128" y2="588" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="card" x1="260" y1="160" x2="940" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="132" y1="132" x2="356" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="110" fill="#67E8F9" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="1040" cy="110" r="140" fill="#A78BFA" fill-opacity="0.22" filter="url(#blur)"/>
  <circle cx="980" cy="520" r="160" fill="#38BDF8" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="250" cy="520" r="160" fill="#818CF8" fill-opacity="0.16" filter="url(#blur)"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1056" height="486" rx="40" fill="#0F172A" fill-opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="96" y="96" width="1008" height="438" rx="32" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.12"/>
  </g>

  <g>
    <rect x="124" y="126" width="196" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.15"/>
    <circle cx="150" cy="148" r="9" fill="#22D3EE"/>
    <text x="172" y="154" fill="#E2E8F0" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">DAVictory</text>
  </g>

  <g>
    <text x="124" y="236" fill="#F8FAFC" font-size="68" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="-1.5">Luyện thi IELTS</text>
    <text x="124" y="308" fill="#F8FAFC" font-size="68" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="-1.5">hiện đại, trực quan</text>
    <text x="124" y="366" fill="#DBEAFE" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="500">Đề thi thực tế • AI phân tích thông minh • Lộ trình cá nhân hóa</text>
  </g>

  <g>
    <rect x="124" y="408" width="220" height="58" rx="18" fill="url(#accent)"/>
    <text x="156" y="445" fill="#0F172A" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="800">Thi thử ngay</text>

    <rect x="360" y="408" width="250" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="390" y="445" fill="#F8FAFC" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Luyện đủ 4 kỹ năng</text>
  </g>

  <g transform="translate(770 150)">
    <rect x="0" y="0" width="300" height="330" rx="28" fill="#0F172A" fill-opacity="0.56" stroke="#FFFFFF" stroke-opacity="0.15"/>
    <rect x="22" y="22" width="256" height="80" rx="20" fill="#FFFFFF" fill-opacity="0.10"/>
    <text x="42" y="58" fill="#F8FAFC" font-size="26" font-family="Inter, Arial, sans-serif" font-weight="800">IELTS 7.0+</text>
    <text x="42" y="84" fill="#BFDBFE" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="500">Lộ trình học tối ưu</text>

    <rect x="22" y="118" width="112" height="80" rx="20" fill="#22D3EE" fill-opacity="0.18"/>
    <text x="42" y="152" fill="#E0F2FE" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Listening</text>
    <text x="42" y="176" fill="#FFFFFF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="800">95%</text>

    <rect x="146" y="118" width="132" height="80" rx="20" fill="#A78BFA" fill-opacity="0.18"/>
    <text x="166" y="152" fill="#E9D5FF" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Writing</text>
    <text x="166" y="176" fill="#FFFFFF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="800">AI</text>

    <rect x="22" y="214" width="256" height="94" rx="24" fill="#FFFFFF" fill-opacity="0.10"/>
    <text x="42" y="250" fill="#F8FAFC" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">Hơn 2000 đề thi</text>
    <text x="42" y="277" fill="#DBEAFE" font-size="15" font-family="Inter, Arial, sans-serif" font-weight="500">Giao diện hiện đại, dễ dùng trên mọi thiết bị</text>
  </g>
</svg>
