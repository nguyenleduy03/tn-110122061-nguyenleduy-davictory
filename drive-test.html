<!DOCTYPE html>
<html>
<head>
    <title>Google Drive Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <h1>🔍 Google Drive Integration Test</h1>

    <div class="test-section">
        <h2>1. Authorization</h2>
        <button onclick="authorize()">Authorize Google Drive</button>
        <div id="auth-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. Check Status (Admin)</h2>
        <input type="text" id="token" placeholder="Enter JWT token" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        <button onclick="checkStatus()">Check Status</button>
        <div id="status-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. Get Drive Info (Admin)</h2>
        <button onclick="getDriveInfo()">Get Drive Info</button>
        <div id="info-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. Test Upload (Admin)</h2>
        <input type="file" id="file-input">
        <button onclick="testUpload()">Upload File</button>
        <div id="upload-result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        function authorize() {
            window.location.href = `${API_BASE}/api/drive/authorize`;
        }

        async function checkStatus() {
            const token = document.getElementById('token').value;
            const result = document.getElementById('status-result');
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/drive/status`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                result.innerHTML = `<span class="success">✓ Status:</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (err) {
                result.innerHTML = `<span class="error">✗ Error:</span> ${err.message}`;
            }
        }

        async function getDriveInfo() {
            const token = document.getElementById('token').value;
            const result = document.getElementById('info-result');
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/drive/info`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                result.innerHTML = `<span class="success">✓ Drive Info:</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (err) {
                result.innerHTML = `<span class="error">✗ Error:</span> ${err.message}`;
            }
        }

        async function testUpload() {
            const token = document.getElementById('token').value;
            const fileInput = document.getElementById('file-input');
            const result = document.getElementById('upload-result');
            
            if (!fileInput.files[0]) {
                result.innerHTML = '<span class="error">Please select a file</span>';
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch(`${API_BASE}/api/admin/drive/test-upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();
                result.innerHTML = `<span class="success">✓ Upload Success:</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (err) {
                result.innerHTML = `<span class="error">✗ Error:</span> ${err.message}`;
            }
        }

        // Check for OAuth callback
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('code')) {
            document.getElementById('auth-result').innerHTML = 
                '<span class="success">✓ Authorization successful! Token saved.</span>';
        }
    </script>
</body>
</html>
